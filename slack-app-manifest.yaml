# DecisionOps — Slack app manifest (internal/custom app, Socket Mode).
# Create the app in one paste: https://api.slack.com/apps → Create New App →
# "From a manifest" → pick your workspace → paste this file.
display_information:
  name: DecisionOps
  description: Turns a Slack thread into a tracked, approved decision brief.
  background_color: "#1d1c1d"
features:
  bot_user:
    display_name: decisionops
    always_online: true
  shortcuts:
    - name: Capture decision
      type: message
      callback_id: capture_decision
      description: Turn this thread into a tracked decision brief
oauth_config:
  scopes:
    # Bot token (xoxb-): posting, canvas, reading thread + Ledger metadata.
    bot:
      - chat:write
      - canvases:write
      - channels:history
      - channels:read
      - groups:history
      - groups:read
    # User token (xoxp-): Real-Time Search runs AS the installing user.
    # search:read.public is required; the rest widen coverage to private/DMs.
    user:
      - search:read.public
      - search:read.private
      - search:read.im
      - search:read.mpim
settings:
  interactivity:
    is_enabled: true
  # Socket Mode = no public request URL needed for shortcuts/actions.
  # You still must generate an App-Level Token (connections:write) — see SETUP.md.
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
